mount_point: /backup
web_port: 8080
web_host: 0.0.0.0

ransomware:
  enabled: false
  sample_size: 30
  change_threshold: 0.30
  fprint_depth: 3

rsync:
  args:
    - --archive
    - --numeric-ids
    - --partial
    - --whole-file
    - --info=progress2,name1

ssh:
  key: keys/id_ed25519
  cipher: aes128-gcm@openssh.com

logging:
  file: /var/log/pullback.log

email:
  enabled: true
  # SMTP credentials go in config.local.yaml (not committed to git)
  # See config.local.yaml.example
  on_failure: true
  on_success: false
  on_warning: true
  on_start: true

tuning:
  net_interface: eth0
  dirty_ratio: 2
  dirty_background_ratio: 1
  dirty_expire_centisecs: 3000
  dirty_writeback_centisecs: 500
  bdi_strict_limit: 1
  bdi_max_bytes: 0  # off — per-drive override via .pullback-tune.yaml
  rps_enabled: true
  rps_cpus: "c"            # CPU mask for RPS (c = CPU2+3, f = all)
  rps_flow_entries: 32768
  eee_off: true
  cpu_governor: performance
  scheduler: mq-deadline
  tcp_slow_start_after_idle: 0
  # nr_requests and max_sectors_kb: left at OS defaults until tested
  # nr_requests: 64
  # max_sectors_kb: 512

autotune:
  dd_size_mb: 512  # dd test file size for write layer
  disk:
    bdi_max_bytes: [62914560, 83886080, 104857600, 125829120, 167772160, 209715200]
    dirty_ratio_pairs: [[1,1], [1,2], [2,1], [2,2], [3,1], [3,2], [5,2]]
    dirty_expire_centisecs: [500, 1000, 2000, 3000, 5000]
    dirty_writeback_centisecs: [10, 20, 50, 100, 200]
    scheduler: [mq-deadline, bfq]
    nr_requests: [2, 4, 8, 16, 32, 64]
    max_sectors_kb: [64, 128, 256, 512]
    read_ahead_kb: [64, 128, 256, 512, 1024]
  network:
    tcp_slow_start_after_idle: [0, 1]
    rmem_max: [212992, 16777216]
    wmem_max: [212992, 16777216]
    netdev_max_backlog: [1000, 5000]
  rsync:
    rps_cpus: ["0", "c", "f"]
    eee: [on, off]
    cpu_governor: [ondemand, performance]

usb:
  flag_file: .pullback-volume
  filesystem: ext4
  reserved_pct: 1
  uas: true

sources:
  pve:
    host: proxmox.home
    remote_root: /ssd8704t/
    folders:
      - path: shares/pac
        retention:
          retain_stamp: "retain_test.txt.$?"
          extn_set: []
          keep: 2

      - path: shares/multimedia
        delete: true

      # - path: shares/backups
      - path: shares/prox-backups/dump
        retention:
          pattern: "vzdump-*"
          extn_set: [.vma.zst, .log, .notes]
          keep: 3

      - path: shares/prox-backups/ellis/dump
        retention:
          pattern: "vzdump-*"
          extn_set: [.vma.zst, .log, .notes]
          keep: 3